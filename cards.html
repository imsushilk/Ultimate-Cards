<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultimate Cards</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/cards.css">
  <style>
    .card-container {
      position: relative;
      width: 80vw;
      height: 65vh;
    }
    .rotate {
      transform: rotateY(180deg);
    }

    .back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      color: blanchedalmond;
    }
    
    </style>
</head>

<body>
  <div class="card-container">
    <div class="defaultcard">
      <div class="frontcard"></div>
      <div class="front box1"></div>
      <div class="front box2"></div>
      <div class="front text">
        <div >#00</div>
        <div style="padding-left: 2%;">Ursa Major Junior</div>
      </div>
      <div class="backcard back"></div>
      
    </div>
  </div>
  <!-- <script type="module" src="js/dummy.js"></script> -->
  <script type="module" src="js/main.js"></script>
  <script type="module" src="js/tilt.js"></script>
</body>

</html>
